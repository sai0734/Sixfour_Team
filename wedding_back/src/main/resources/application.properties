spring.application.name=wedding

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/weddingdb
spring.datasource.username=weddingdbuser
spring.datasource.password=weddingdbuser

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

logging.level.org.hibernate.SQL=info
logging.level.org.springframework.security.web=trace

spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.max-file-size=100MB

com.wedding.upload.path=upload

# AI 웨딩플랜 세션 정리 - 마이페이지에 담기(appliedToPlan) 안 하고 이 일수만큼 방치된
# 세션은 매일 자정 배치(AiPlanSessionCleanupScheduler)로 자동 삭제됨
com.wedding.aiplan.session-ttl-days=30

# AI 견적서 - 업로드 후 이 일수만큼 지나면 예외 없이 전부 자동 삭제(QuoteCleanupScheduler)
com.wedding.quote.retention-days=30

